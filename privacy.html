<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Politique de confidentialité | Project PKS</title>

  <style>
    :root{--blue:#0B2E6B;--muted:#3F565E;--line:#D2E6DF;--bg:#F2FBF7}
    *{box-sizing:border-box}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;color:#0F1F26;line-height:1.7;background:var(--bg)}
    .wrap{max-width:780px;margin:0 auto;padding:40px 20px}
    h1{color:var(--blue);font-size:32px;font-weight:900;margin:0 0 8px}
    h2{color:var(--blue);font-size:18px;font-weight:900;margin:32px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px}
    p,li{color:#2a3a40;font-size:15px;margin:0 0 10px}
    ul{padding-left:20px;margin:0 0 10px}
    .badge{display:inline-block;background:rgba(11,46,107,.08);color:var(--blue);font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;margin-bottom:20px}
    a{color:var(--blue)}
    .warning{background:rgba(215,175,74,.12);border:1px solid rgba(215,175,74,.4);border-radius:12px;padding:12px 16px;font-size:14px;margin:10px 0}
    footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;text-align:center}
    .btn{display:inline-flex;align-items:center;padding:10px 16px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--blue);font-weight:900;font-size:13px;text-decoration:none;margin-bottom:32px}
  </style>
</head>
<body>

  <div id="content"></div>

</div>

function detectLang(){
  const l=(navigator.language||"fr").toLowerCase();
  if(l.startsWith("pt"))return"pt";
  if(l.startsWith("fr"))return"fr";
  return"en";
}

function render(lang){
  const t=T[lang]||T.fr;
  document.title=t.title;
  document.getElementById("pageTitle").textContent=t.title;
  document.getElementById("badge").textContent=t.badge;
  document.getElementById("btnBack").textContent=t.back;
  document.getElementById("footer").textContent=t.footer;
  document.getElementById("content").innerHTML=t.s.map(s=>"<h2>"+s.h+"</h2>"+s.b).join("");
}

render(detectLang());
</script>
</body>
</html>
