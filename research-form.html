<html lang="fr">

  <title>Participer à la recherche | Project PKS</title>
  <meta name="theme-color" content="#0B2E6B">
  <meta name="description" content="Questionnaire de recherche pour les familles concernées par le syndrome de Pallister-Killian." />

  <style>

    .brand b{color:var(--blue);font-size:15px;letter-spacing:.25px}
    nav{justify-self:center;display:flex;gap:6px;flex-wrap:nowrap;white-space:nowrap;overflow:auto;scrollbar-width:none;align-items:center}
    nav::-webkit-scrollbar{display:none}
    nav a{font-size:13.5px;color:var(--muted);padding:8px 10px;border-radius:999px;text-decoration:none;border:1px solid transparent}
    nav a:hover{background:rgba(30,99,255,.08);border-color:rgba(30,99,255,.12);color:var(--blue)}
    .headerRight{justify-self:end;display:flex;align-items:center;gap:10px}
    .btn,a.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border-radius:999px;border:1px solid rgba(210,230,223,.95);background:rgba(255,255,255,.90);color:var(--blue);cursor:pointer;font-weight:900;font-size:14px;text-decoration:none;box-shadow:0 10px 22px rgba(11,46,107,.08);transition:transform .08s ease,opacity .15s ease}
    .btn:hover,a.btn:hover{opacity:.96}
    .btn:active,a.btn:active{transform:translateY(1px)}
    .btnPrimary{border:none;color:#1b1402;background:linear-gradient(135deg,#f3d37f,var(--gold))}
    .navToggle{display:none;border:1px solid rgba(210,230,223,.95);background:rgba(255,255,255,.82);color:var(--blue);font-weight:900;border-radius:999px;padding:9px 11px;cursor:pointer;box-shadow:0 10px 22px rgba(11,46,107,.08)}

      .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
      .headerRight{margin-left:auto}
      .navToggle{display:inline-flex}
      nav{display:none;width:100%;padding-top:10px;overflow:visible;white-space:normal;flex-wrap:wrap}
      nav[data-open="true"]{display:flex}
    }
    .heroTop{margin-top:16px;border-radius:30px;overflow:hidden;border:1px solid rgba(255,255,255,.70);box-shadow:var(--shadow);background:rgba(255,255,255,.92)}
    .heroTopInner{padding:18px}
    .heroText{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:26px;padding:22px;box-shadow:var(--shadow2)}
    .heroKicker{margin:0 0 8px;color:var(--muted);font-size:13px;font-weight:900}
    .heroTitle{margin:0 0 10px;color:var(--blue);font-size:42px;line-height:1.05;letter-spacing:-.9px;font-weight:900}
    .heroSub{margin:0 0 12px;color:var(--muted);font-size:16px}
    .card{background:rgba(255,255,255,.93);border:1px solid var(--line);border-radius:26px;padding:18px;box-shadow:var(--shadow2);position:relative;overflow:hidden;margin-top:18px}
    .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,var(--blue2),var(--green));opacity:.9}
    .cardInner{position:relative}
    .card h3{margin:0 0 10px;color:var(--blue);font-weight:900}
    .formSectionTitle{color:var(--blue);font-size:22px;font-weight:900;margin:0 0 10px}
    .formBlock{border-top:1px solid var(--line);padding-top:18px;margin-top:18px}
    label{display:block;font-weight:800;color:var(--blue);margin:14px 0 6px;font-size:14px}
    input[type="text"],input[type="email"],input[type="date"],textarea,select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-size:14px;outline:none}
    input:focus,textarea:focus,select:focus{border-color:rgba(30,99,255,.4);box-shadow:0 0 0 4px rgba(30,99,255,.08)}
    textarea{min-height:110px;resize:vertical}
    .inlineChoices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:8px}
    .inlineChoices.inline3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .inlineChoices.inline4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .checkItem{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.9);min-height:52px}
    .checkItem label{margin:0;font-weight:700;color:var(--ink);font-size:14px;flex:1}
    .checkItem input{margin-top:3px;flex:0 0 auto}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    @media(max-width:980px){
      .grid2,.grid3{grid-template-columns:1fr}
      .heroTitle{font-size:34px}
    }
    @media(max-width:480px){
      .inlineChoices.inline3,.inlineChoices.inline4{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    .submitWrap{margin-top:28px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .consentBlock{background:rgba(215,175,74,.08);border:1px solid rgba(215,175,74,.35);border-radius:16px;padding:16px 18px;margin-top:14px;display:flex;align-items:flex-start;gap:12px}

    .consentBlock label{margin:0;font-size:13.5px;color:var(--ink);font-weight:600}
    .required-star{color:#c0392b;margin-left:3px}
    #formMsg{display:none;margin-top:16px;padding:14px 18px;border-radius:14px;font-weight:700;font-size:14px}
    footer{margin-top:26px;border-top:1px solid var(--line);padding:18px 0 40px;color:var(--muted);font-size:13px}
    .sectionTitle{margin:24px 0 10px;color:var(--blue);font-size:28px;letter-spacing:-.2px;font-weight:900}
    .sectionSub{margin:0 0 14px;color:var(--muted);max-width:92ch;font-size:15.5px}

</head>

      </div>
    </div>
  </section>

  <footer>
    <div style="display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <div id="footerText"></div>
    </div>
  </footer>
</main>

// ─── LANGUAGE DETECTION ───────────────────────────────────────────────────────
function detectLang() {
  const lang = (navigator.language || "fr").toLowerCase();
  if (lang.startsWith("pt")) return "pt";
  if (lang.startsWith("fr")) return "fr";
  return "en";
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function star() { return ' <span class="required-star">*</span>'; }

function radio(name, value, labelText, id) {
  return `<div class="checkItem"><input type="radio" name="${name}" value="${value}" id="${id}"><label for="${id}">${labelText}</label></div>`;
}

function checkbox(name, value, labelText, id) {
  return `<div class="checkItem"><input type="checkbox" name="${name}[]" value="${value}" id="${id}"><label for="${id}">${labelText}</label></div>`;
}

function motorCard(title, namePfx, statusAcq, statusNotAcq, agePh) {
  return `<div class="card" style="margin-top:0;"><div class="cardInner">
    <h3 style="margin:0 0 10px;">${title}</h3>
    <label>${t.statusL}</label>
    <select name="${namePfx} - statut">
      <option value="">${t.choose}</option>
      <option value="achieved">${statusAcq}</option>
      <option value="not_achieved">${statusNotAcq}</option>
    </select>
    <label>${t.ageL}</label>
    <input type="text" name="${namePfx} - âge" placeholder="${agePh}">
  </div></div>`;
}

function block(num, title, inner) {
  return `<div class="formBlock"><div class="formSectionTitle">${title}</div>${inner}</div>`;
}

function selectField(name, labelText, options) {
  const opts = options.map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
  return `<div><label>${labelText}</label><select name="${name}"><option value="">${t.choose}</option>${opts}</select></div>`;
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("formMsg");
  btn.disabled = true;
  btn.textContent = t.sending;
  msg.style.display = "none";

  const data = {};
  const fd = new FormData(this);
  const multi = {};
  for (const [key, val] of fd.entries()) {
    if (key.endsWith("[]")) {
      const k = key.slice(0,-2);
      if (!multi[k]) multi[k] = [];
      multi[k].push(val);
    } else {
      data[key] = val;
    }
  }
  for (const [k,v] of Object.entries(multi)) data[k+"[]"] = v.join(", ");

  try {
    const res = await fetch(SCRIPT_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data) });
    const result = await res.json();
    if (result.result === "success") {
      msg.style.cssText = "display:block;background:rgba(25,182,122,.12);border:1px solid rgba(25,182,122,.4);color:#0f4a32;margin-top:16px;padding:14px 18px;border-radius:14px;font-weight:700;font-size:14px;";
      msg.textContent = t.successMsg;
      btn.textContent = t.btnSubmit;
      btn.disabled = false;
      this.reset();
      window.scrollTo({top:0,behavior:"smooth"});
      return;
    } else { throw new Error(); }
  } catch {
    msg.style.cssText = "display:block;background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.3);color:#7b1a1a;margin-top:16px;padding:14px 18px;border-radius:14px;font-weight:700;font-size:14px;";
    msg.textContent = t.errorMsg;
  }
  btn.textContent = t.btnSubmit;
  btn.disabled = false;
}

// ─── NAV TOGGLE ───────────────────────────────────────────────────────────────
function toggleNav() {
  const nav = document.getElementById("mainNav");
  const btn = document.querySelector(".navToggle");
  if (!nav || !btn) return;
  const isOpen = nav.getAttribute("data-open") === "true";
  nav.setAttribute("data-open", isOpen ? "false" : "true");
  btn.setAttribute("aria-expanded", isOpen ? "false" : "true");
}
